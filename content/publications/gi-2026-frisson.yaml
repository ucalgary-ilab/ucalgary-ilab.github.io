date: 2026-06
title: "Panel and Networking Session on Teaching Creative Coding"
authors:
  - Christian Frisson
  - Daniel Vogel
series: GI 2026 Special Sessions
keywords: teaching, creative coding
abstract: "Creative coding is the use of programming as a medium for creative expression, often to produce interactive, generative, or audiovisual works. This 1.5-hour special session will bring together panelists with experience teaching creative coding courses at the university or equivalent level. The format will include approximately 60 minutes of lightning talks by 4–6 panelists from multidisciplinary backgrounds, including art, computer science, and engineering, followed by a combined discussion and networking segment to foster exchange among all participants"
