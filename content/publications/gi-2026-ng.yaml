keywords: haptic displays, hybrid actuation, immersive arts
abstract: "Sensations build our experiences, and the sense of touch, a crucial component of engaging vir tual environments, remains underused. We examine the advantages of combining multiple types of actuators and applying this hybrid actuation concept to shape-changing displays to enhance their versatility."
