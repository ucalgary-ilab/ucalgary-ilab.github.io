  description: The iLab has hosted Demo Day 2026. This event provides a once-a-year opportunity to see some of the exciting new research in data visualization, human-robot interaction, remote collaboration, digital fabrication, haptics, and creative and playful user interfaces taking place in the iLab.<br/>Demo Day features short presentations from iLab professors, as well as PhD, Masters and Undergraduate Students about their current research. Topics include health visualizations, human-robot interaction, designing for creativity, social VR, epidermal robots, performance and HCI, haptics, human-AI interaction and many more.<br/>The round of talks is followed by demonstrations that visitors will interact with in small groups along the same research themes.<br/><br/><h2>Minute Madness Presentations</h2><div class="google-slides-container"><iframe src="https://docs.google.com/presentation/d/e/2PACX-1vQdzbXAdncTn6mHiYzvuZgsRy35VE4Zn0CT1OdwuNBXhj4vJFRiZ2FTFtNBGXTQ-gzWVJJjkkyz1QL2/pubembed?start=true&loop=true&delayms=3000" frameborder="0" width="100%" height="auto" allowfullscreen="true" mozallowfullscreen="true" webkitallowfullscreen="true"></iframe></div>
